<html>
<head>
    <!-- 1. Cytoscape import is missing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
    <style>
        #cy {
            width: 100%;
            height: 100vh; /* 2. The canvas needs explicit dimensions */
        }
    </style>
</head>
<body>
    <div id="cy"></div>
    <script>
        let cy;
        
        function initializeCytoscape(data) {
            console.log("=== Inicializando Cytoscape ===");
            console.log("Dados recebidos:", data);
            console.log("Elementos:", data.elements ? data.elements.length : 'N/A');
            
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: data.elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': function(ele) {
                                return ele.data('name') ? ele.data('name').replace(/"/g, '') : '';
                            },
                            'shape': 'round-rectangle',
                            'background-color': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return '#FFFFFF'; 
                                    case 'gene': return '#FFFFFF';    
                                    case 'pathway': return '#FFFFFF'; 
                                    case 'species': return '#FFFFFF';
                                    case 'metabolite': return '#FFFFFF';       
                                }
                            },
                            'color': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return '#6FAF9C'; 
                                    case 'gene': return '#87CEE0';    
                                    case 'pathway': return '#b6e8b3'; 
                                    case 'species': return '#c7c7c7';
                                    case 'metabolite': return '#A665B5';       
                                }
                            },
                            //'rotation': '45deg',
                            'font-size': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return 50; 
                                    case 'gene': return 50;    
                                    case 'pathway': return 20; 
                                    case 'species': return 20;
                                    case 'metabolite': return 20;       
                                }
                            },
                            'font-weight': 'bold',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'width': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return 100; 
                                    case 'gene': return 100;    
                                    case 'pathway': return 80; 
                                    case 'species': return 100;
                                    case 'metabolite': return 45;       
                                }
                            },
                            'height': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return 100;
                                    case 'gene': return 100;    
                                    case 'pathway': return 20; 
                                    case 'species': return 20;
                                    case 'metabolite': return 20;       
                                }
                            },
                            //'text-wrap': 'wrap',
                            //'text-max-width': 50,
                            'padding': '1px',
                            'border-width': 0,
                            'opacity': 10,
                            'background-opacity': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return 1; 
                                    case 'gene': return 1;    
                                    case 'pathway': return 1; 
                                    case 'species': return 1;
                                    case 'metabolite': return 1;       
                                }
                            },
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'curve-style': 'bezier',
                            'width': 1,
                            'line-color': '#cfcfcf',
                            'target-arrow-shape': 'none',
                            'opacity': 20
                        }
                    }
                ]
                
            });
            
            // Agrupar nós por camada
            const layers = {};
            cy.nodes().forEach(node => {
                const layer = node.data('_layer_') || 1;
                if (!layers[layer]) layers[layer] = [];
                layers[layer].push(node);
            });

            const sortedLayers = Object.keys(layers).map(Number).sort((a, b) => a - b);
            const nodeWidth = 100;          // Largura aproximada do nó + margem
            const baseRadius = 1000;        // Raio base (ajuste conforme necessário)
            const layerStep = 1;           // Incremento de raio por camada
            const squashFactor = 1;        // Fator de compressão (aplicado à largura, agora)

            function getDiamondArcPoint(t, radius, roundness = 0.5) {
                const a = radius;          // largura
                const b = radius;          // altura
                const n = roundness;       // controla o "quão losango"

                const cosT = Math.cos(t);
                const sinT = Math.sin(t);

                return {
                    x: a * Math.sign(cosT) * Math.pow(Math.abs(cosT), 2 / n),
                    y: (b * Math.sign(sinT) * Math.pow(Math.abs(sinT), 2 / n))
                };
            }

            const positions = {};

            sortedLayers.forEach((layerNum, index) => {
                const nodes = layers[layerNum];
                const count = nodes.length;

                if (count === 1) {
                    positions[nodes[0].id()] = { x: 0, y: 0 };
                    return;
                }

                // Raio mínimo para que os nós caibam ao redor da circunferência aproximada
                const minRadius = (count * nodeWidth * 3) / (4 * Math.PI);
                const radius = Math.max(baseRadius + layerStep * index, minRadius) * 0.7;
                const samples = 1000;
                const points = [];
                let totalLength = 0;

                // Amostragem da curva
                for (let i = 0; i <= samples; i++) {
                    const t = (2 * Math.PI * i) / samples;
                    const p = getDiamondArcPoint(t, radius, 1);
                    points.push({ t, x: p.x, y: p.y });

                    if (i > 0) {
                        const dx = p.x - points[i - 1].x;
                        const dy = p.y - points[i - 1].y;
                        totalLength += Math.sqrt(dx * dx + dy * dy);
                        points[i].arcLength = totalLength;
                    } else {
                        points[i].arcLength = 0;
                    }
                }
                nodes.forEach((node, j) => {
                    const targetLength = (totalLength * j) / count;

                    // Encontrar ponto mais próximo do comprimento desejado
                    let closest = points[0];
                    for (let k = 1; k < points.length; k++) {
                        if (points[k].arcLength >= targetLength) {
                            closest = points[k];
                            break;
                        }
                    }
                    //node.data('angle', closest.t);
                    positions[node.id()] = {
                        x: closest.x * squashFactor,
                        y: closest.y
                    };
                });
            });

            const layout = cy.layout({
                name: 'preset',
                positions: node => positions[node.id()],
                fit: true,
                padding: 250,
                spacingFactor: 0.5,
                avoidOverlap: true
            });

            layout.run();
        }

        // Load the file and initialize
        fetch("PDE4B_r.cyjs")
            .then(res => {
                if (!res.ok) {
                    throw new Error('Arquivo não encontrado.');
                }
                return res.json();
            })
            .then(data => {
                data.elements.nodes.forEach(n => {
                    if (n.data.name) {
                        n.data.name = n.data.name.replace(/"/g, '');
                    }
                    if (n.data.shared_name) {
                        n.data.shared_name = n.data.shared_name.replace(/"/g, '');
                    }
                });
                initializeCytoscape(data);

            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('centrality-results').innerHTML = 
                    '<div class="centrality-results"><h3>Error</h3><p>Could not load network data. Make sure file exists.</p></div>';
            });
    </script>
 
</body>
</html>
