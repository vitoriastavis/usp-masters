<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.21.1/cytoscape.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            min-height: 600px;
        }
        
        .network-section {
            width: 65%;
            min-width: 600px;
            flex-shrink: 0;
        }
        
        .centrality-section {
            width: 35%;
            min-width: 300px;
            max-width: 400px;
            max-height: 600px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
        
        .centrality-results {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .centrality-results h3 {
            margin-top: 0;
            color: #000000;
            font-size: 14px;
        }
        
        .centrality-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }
        
        .centrality-list li {
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .centrality-list li:last-child {
            border-bottom: none;
        }
        
        .metabolite-name {
            color: #000000;
            font-size: 14px;
        }
        
        .centrality-value {
            color: #666;
            font-size: 14px;
        }
        
        .instructions {
            background: #e8f4fd;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <h2>Graph visualizer</h2>

    <div class="container">
        <div class="network-section">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #c7c7c7;"></div>
                    <span>Species</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #b4b3e8;"></div>
                    <span>Gene</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #e5baff;"></div>
                    <span>Metabolite</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffbadb;"></div>
                    <span>MDD</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #b6e8b3;"></div>
                    <span>Pathway</span>
                </div>
            </div>
            
            <div id="cy" style="width: 100%; height: 600px; border: 1px solid #ccc; min-width: 500px;"></div>
        </div>
        
        <div class="centrality-section">
            <!-- <div class="instructions">
                <strong>Instructions:</strong><br>
                • Click any node in the network to highlight it and its connections<br>
                • Click the same node again to remove highlighting<br>
                • Click metabolite names below to highlight from centrality rankings<br>
                • Multiple nodes can be highlighted simultaneously
            </div> -->
            
            <div id="centrality-results">
                <p>Loading centrality analysis...</p>
            </div>
        </div>
    </div>

    <script>
        let cy;
        
        function initializeCytoscape(data) {
            console.log("=== Inicializando Cytoscape ===");
            console.log("Dados recebidos:", data);
            console.log("Elementos:", data.elements ? data.elements.length : 'N/A');
            
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: data.elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': function(ele) {
                                return ele.data('name') ? ele.data('name').replace(/"/g, '') : '';
                            },
                            'shape': 'round-rectangle',
                            'background-color': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                
                                switch(type) {
                                    case 'disorder': return '#ffbadb'; 
                                    case 'gene': return '#b4b3e8';    
                                    case 'pathway': return '#b6e8b3'; 
                                    case 'species': return '#c7c7c7';
                                    case 'metabolite': return '#e5baff';       
                                }
                            },
                            'color': '#000000',
                            'font-size': function(ele) {
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').trim().toLowerCase() : '';

                                if (type === 'disorder' || type == 'gene') {
                                    return 8000;
                                } else {
                                    return 5000;
                                }
                            },
                            'font-weight': 'bold',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'width': 50000,
                            // function(ele) {
                            //     var text = ele.data('name') ? ele.data('name').replace(/"/g, '') : '';
                            //     var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                            //     var words = text.split(/\s+/);
                            //     var maxWordLength = words.reduce((max, w) => Math.max(max, w.length), 0);
                            //     if (type === 'disorder' || type == 'gene') {
                            //         return maxWordLength * 1200; 
                            //     } else {
                            //         return maxWordLength * 500; 
                            //     }                             
             
                            //},
                            'height': function(ele) {
                                var text = ele.data('name') ? ele.data('name').replace(/"/g, '') : '';
                                var type = ele.data('_type_') ? ele.data('_type_').replace(/"/g, '').toLowerCase() : '';
                                var words = text.split(/\s+/).filter(w => w.length > 0); // ignore empty splits
                                var nWords = words.length;

                                if (type === 'disorder' || type == 'gene') {
                                    return nWords * 1500;
                                } else {
                                    return nWords * 1400;
                                }                               

                            },
                            'text-wrap': 'wrap',
                            'text-max-width': function(ele) {
                                var text = ele.data('name') ? ele.data('name').replace(/"/g, '') : '';
                                return text.length * 1000;
                            },
                            'padding': '1px',
                            'border-width': 0,
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'curve-style': 'bezier',
                            'width': 20,
                            'line-color': 'rgba(136, 136, 136, 0.4)',
                            'target-arrow-shape': 'none',
                            'opacity': 0.5
                        }
                    },
                    // Highlighted node styles
                    {
                        selector: '.highlighted',
                        style: {
                            'border-width': 80,
                            'border-color': '#c74040',
                            'background-color': '#FFF'
                        }
                    },
                    {
                        selector: 'edge.highlighted',
                        style: {
                            'width': 80,
                            'line-color': '#c74040',
                            'opacity': 1,
                            'z-index': 10
                        }
                    },
                    {
                        selector: '.connected',
                        style: {
                            'border-width': 5,
                            'border-color': '#c74040',
                            'opacity': 1
                        }
                    }
                ],
                layout: {
                    name: 'concentric',
                    equidistant: true,
                    concentric: function(node) { 
                        return node.data('_layer_') || 1;  
                    },
                    levelWidth: function(nodes) {
                        return 1;
                    },
                    spacingFactor: 0.09,
                    fit: true,
                    padding: 20,
                    avoidOverlap: true
                }
            });
            
            // Add click event listener to nodes for highlighting/unhighlighting
            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                toggleNodeHighlight(node);
            });
            
            // Calculate centrality measures after network is initialized
            //calculateMeasures();
            // First, run debug to see what's in the graph
            debugGraph();

            // Then try your analysis
            const metaboliteData = findMetabolitesByTargets(['FGFR3']);
            calculateMeasures(metaboliteData, 95);
        }
        
        function toggleNodeHighlight(node) {
            // Check if node is already highlighted
            if (node.hasClass('highlighted')) {
                // Remove highlighting from this node and its connections
                const connectedEdges = node.connectedEdges();
                const connectedNodes = connectedEdges.connectedNodes().difference(node);
                
                node.removeClass('highlighted');
                connectedEdges.removeClass('highlighted');
                connectedNodes.removeClass('connected');
            } else {
                // Add highlighting to this node and its connections
                const connectedEdges = node.connectedEdges();
                const connectedNodes = connectedEdges.connectedNodes().difference(node);
                
                node.addClass('highlighted');
                connectedEdges.addClass('highlighted');
                connectedNodes.addClass('connected');
            }
        }
        
        /**
         * DEBUG: Check graph structure and available data
         */
        function debugGraph() {
            console.log("=== GRAPH DEBUG INFO ===");
            console.log("Total nodes:", cy.nodes().length);
            console.log("Total edges:", cy.edges().length);
            
            // Check node types
            const types = {};
            cy.nodes().forEach(node => {
                const type = node.data('_type_');
                types[type] = (types[type] || 0) + 1;
            });
            console.log("Node types:", types);
            
            // Sample first 5 nodes to see data structure
            console.log("\nSample nodes (first 5):");
            cy.nodes().slice(0, 5).forEach(node => {
                console.log({
                    id: node.id(),
                    name: node.data('name'),
                    shared_name: node.data('shared_name'),
                    type: node.data('_type_'),
                    allData: node.data()
                });
            });
            
            // Check for specific proteins
            const testProteins = ['FGFR3'];
            console.log("\nSearching for test proteins:");
            testProteins.forEach(protName => {
                const found = cy.nodes().filter(n => 
                    n.data('name') === protName || 
                    n.data('shared_name') === protName ||
                    n.id() === protName
                );
                console.log(`  ${protName}: ${found.length > 0 ? 'FOUND' : 'NOT FOUND'}`);
                if (found.length > 0) {
                    console.log(`    - ID: ${found.first().id()}, Type: ${found.first().data('_type_')}`);
                }
            });
        }

        /**
         * Finds metabolites connected to specified target proteins
         * @param {Array<string>} targetProteins - Array of protein names (e.g., ['FGFR3', 'PROT1'])
         * @param {boolean} requireAll - If true, metabolite must connect to ALL proteins. If false, ANY protein.
         * @returns {Object} Object containing metabolite nodes and metadata
         */
        function findMetabolitesByTargets(targetProteins, requireAll = false) {
            console.log(`\n=== Finding metabolites for proteins: ${targetProteins.join(', ')} (requireAll: ${requireAll}) ===`);

            // Sanitize quotes from all nodes
            cy.nodes().forEach(node => {
                ['name', 'shared_name', '_type_'].forEach(field => {
                    if (node.data(field)) {
                        node.data(field, node.data(field).replace(/^"|"$/g, ''));
                    }
                });
            });

            // Find all specified protein nodes
            const proteinNodes = [];
            const notFound = [];
            
            targetProteins.forEach(proteinName => {
                console.log(`  Searching for protein: ${proteinName}`);
                const found = cy.nodes().filter(n => n.data('name') === proteinName);
                console.log(`    Found ${found.length} node(s)`);
                
                if (found.length === 0) {
                    notFound.push(proteinName);
                } else {
                    const node = found.first();
                    console.log(`    Using node: ID=${node.id()}, Type=${node.data('_type_')}`);
                    proteinNodes.push(node);
                }
            });

            if (notFound.length > 0) {
                console.warn(`Protein(s) not found: ${notFound.join(', ')}`);
            }

            if (proteinNodes.length === 0) {
                console.error("No specified proteins found in the graph!");
                return { metabolites: cy.collection(), proteins: [], notFound };
            }
            
            console.log(`Successfully found ${proteinNodes.length} protein node(s)`);

            // Get metabolites connected to the proteins
            let metaboliteNodes;
            
            if (requireAll) {
                console.log("  Using AND logic (metabolite must connect to ALL proteins)");
                // Metabolite must connect to ALL specified proteins
                metaboliteNodes = proteinNodes[0]
                    .connectedEdges()
                    .connectedNodes()
                    .filter(n => n.data('_type_') === 'Metabolite');
                
                console.log(`    Starting with ${metaboliteNodes.length} metabolites from ${proteinNodes[0].data('name')}`);
                
                // Intersect with metabolites connected to each other protein
                for (let i = 1; i < proteinNodes.length; i++) {
                    const connectedToThis = proteinNodes[i]
                        .connectedEdges()
                        .connectedNodes()
                        .filter(n => n.data('_type_') === 'Metabolite');
                    console.log(`    Intersecting with ${connectedToThis.length} metabolites from ${proteinNodes[i].data('name')}`);
                    metaboliteNodes = metaboliteNodes.intersection(connectedToThis);
                    console.log(`    Result: ${metaboliteNodes.length} metabolites`);
                }
            } else {
                console.log("  Using OR logic (metabolite connects to ANY protein)");
                // Metabolite connects to ANY of the specified proteins
                metaboliteNodes = cy.collection();
                proteinNodes.forEach(protein => {
                    const connected = protein
                        .connectedEdges()
                        .connectedNodes()
                        .filter(n => n.data('_type_') === 'Metabolite');
                    console.log(`    ${protein.data('name')}: ${connected.length} connected metabolites`);
                    metaboliteNodes = metaboliteNodes.union(connected);
                });
                console.log(`    Total unique metabolites: ${metaboliteNodes.length}`);
            }

            console.log(`\n=== RESULT: Found ${metaboliteNodes.length} metabolites ===\n`);

            return {
                metabolites: metaboliteNodes,
                proteins: proteinNodes.map(p => p.data('name')),
                notFound: notFound
            };
        }

        /**
         * Calculates centrality measures and distance to MDD for given metabolites
         * @param {Object} metaboliteData - Object returned from findMetabolitesByTargets
         * @param {number} percentileThreshold - Percentile threshold (e.g., 95 = top 5%)
         */
        function calculateMeasures(metaboliteData, percentileThreshold = 95) {
            const { metabolites: metaboliteNodes, proteins, notFound } = metaboliteData;

            if (notFound.length > 0) {
                document.getElementById('centrality-results').innerHTML = `
                    <div class="centrality-results">
                        <h3>Warning: Some Proteins Not Found</h3>
                        <p>Could not find: ${notFound.join(', ')}</p>
                    </div>`;
            }

            if (metaboliteNodes.length === 0) {
                document.getElementById('centrality-results').innerHTML = `
                    <div class="centrality-results">
                        <h3>No Metabolites Found</h3>
                        <p>No metabolite nodes were found connected to: ${proteins.join(', ')}</p>
                    </div>`;
                return;
            }

            console.log(`Calculating centrality for ${metaboliteNodes.length} metabolites...`);

            // === Calculate degree centrality ===
            const degreeCentrality = [];
            metaboliteNodes.forEach(function (node) {
                const degree = node.degree();
                const name = node.data('name') ? node.data('name').replace(/"/g, '') : node.id();
                degreeCentrality.push({ name: name, value: degree, id: node.id() });
            });

            // === Calculate betweenness centrality ===
            const betweenness = cy.elements().betweennessCentrality();
            const betweennessCentrality = [];
            metaboliteNodes.forEach(function (node) {
                const betweennessValue = betweenness.betweenness('#' + node.id()) || 0;
                const name = node.data('name') ? node.data('name').replace(/"/g, '') : node.id();
                betweennessCentrality.push({ name: name, value: betweennessValue, id: node.id() });
            });

            // === Calculate closeness centrality ===
            const closeness = cy.elements().closenessCentralityNormalized();
            const closenessCentrality = [];
            metaboliteNodes.forEach(function (node) {
                const closenessValue = closeness.closeness('#' + node.id()) || 0;
                const name = node.data('name') ? node.data('name').replace(/"/g, '') : node.id();
                closenessCentrality.push({ name: name, value: closenessValue, id: node.id() });
            });

            // === Display top 20 for each metric ===
            const topDegree = degreeCentrality.sort((a, b) => b.value - a.value).slice(0, 20);
            const topBetweenness = betweennessCentrality.sort((a, b) => b.value - a.value).slice(0, 20);
            const topCloseness = closenessCentrality.sort((a, b) => b.value - a.value).slice(0, 20);

            displayCentralityResults(topDegree, topBetweenness, topCloseness);

            // === Percentile function ===
            function percentile(arr, p) {
                const sorted = [...arr].sort((a, b) => a - b);
                const idx = (p / 100) * (sorted.length - 1);
                const lower = Math.floor(idx);
                const upper = Math.ceil(idx);
                const weight = idx - lower;
                return sorted[lower] + weight * (sorted[upper] - sorted[lower]);
            }

            // === Percentile threshold ===
            const Q = percentileThreshold;
            const degVals = degreeCentrality.map(d => d.value);
            const betVals = betweennessCentrality.map(b => b.value);
            const cloVals = closenessCentrality.map(c => c.value);

            const degThr = percentile(degVals, Q);
            const betThr = percentile(betVals, Q);
            const cloThr = percentile(cloVals, Q);

            // === Calculate distances from MDD ===
            const dijkstra = cy.elements().dijkstra('#MDD', () => 1);

            // === Filter metabolites above quantile thresholds and store distance ===
            const filtered = metaboliteNodes.map((node, i) => {
                const id = node.id();
                const name = node.data('name') ? node.data('name').replace(/"/g, '') : id;
                const deg = degreeCentrality[i].value;
                const bet = betweennessCentrality[i].value;
                const clo = closenessCentrality[i].value;
                const dist = dijkstra.distanceTo('#' + id);
                return { id, name, deg, bet, clo, dist, passes: deg >= degThr && bet >= betThr && clo >= cloThr };
            });

            // === Keep only those that pass thresholds ===
            let topPercentileMetabolites = filtered.filter(x => x.passes);

            // === Sort by distance (shorter = closer to MDD), then degree ===
            topPercentileMetabolites.sort((a, b) => {
                if (a.dist !== b.dist) return a.dist - b.dist;
                return b.deg - a.deg;
            });

            // === Display results ===
            const container = document.getElementById('centrality-results');
            const htmlQ = `
                <div class="centrality-results" style="font-size: 0.85em; margin-top: 10px;">
                    <h3 style="font-size: 1em;">Top ${100 - Q}% Metabolites (targeting: ${proteins.join(', ')}, sorted by distance to MDD)</h3>
                    ${
                        topPercentileMetabolites.length > 0
                            ? `<ol style="margin-left: 20px;">
                                ${topPercentileMetabolites.map(n => 
                                    `<li>${n.name} — dist: ${isFinite(n.dist) ? n.dist : '∞'}, deg: ${n.deg}, bet: ${n.bet.toFixed(2)}, clo: ${n.clo.toFixed(3)}</li>`
                                ).join('')}
                            </ol>`
                            : `<p>No metabolites found above ${Q}th percentile thresholds.</p>`
                    }
                </div>
            `;
            container.insertAdjacentHTML('beforeend', htmlQ);
        }

        
        function displayCentralityResults(degree, betweenness, closeness) {
            const resultsDiv = document.getElementById('centrality-results');
            
            let html = '';
            
            // Degree Centrality
            html += '<div class="centrality-results">';
            html += '<h3>Top 5 - Degree Centrality</h3>';
            html += '<ul class="centrality-list">';
            degree.forEach((item, index) => {
                html += `<li><span class="metabolite-name">${index + 1}. ${item.name}</span><span class="centrality-value">${item.value}</span></li>`;
            });
            html += '</ul></div>';
            
            // Betweenness Centrality
            html += '<div class="centrality-results">';
            html += '<h3>Top 5 - Betweenness Centrality</h3>';
            html += '<ul class="centrality-list">';
            betweenness.forEach((item, index) => {
                html += `<li><span class="metabolite-name">${index + 1}. ${item.name}</span><span class="centrality-value">${item.value.toFixed(6)}</span></li>`;
            });
            html += '</ul></div>';
            
            // Closeness Centrality
            html += '<div class="centrality-results">';
            html += '<h3>Top 5 - Closeness Centrality</h3>';
            html += '<ul class="centrality-list">';
            closeness.forEach((item, index) => {
                html += `<li><span class="metabolite-name">${index + 1}. ${item.name}</span><span class="centrality-value">${item.value.toFixed(6)}</span></li>`;
            });
            html += '</ul></div>';
            
            resultsDiv.innerHTML = html;
            
            // Add click functionality to highlight nodes from centrality lists
            addHighlightFunctionality();
        }
        
        function addHighlightFunctionality() {
            const metaboliteItems = document.querySelectorAll('.metabolite-name');
            
            metaboliteItems.forEach(item => {
                item.style.cursor = 'pointer';
                item.addEventListener('click', function() {
                    const metaboliteName = this.textContent.replace(/^\d+\.\s*/, ''); // Remove number prefix
                    highlightMetaboliteFromList(metaboliteName);
                });
            });
        }
        
        function highlightMetaboliteFromList(metaboliteName) {
            // Find the metabolite node
            const targetNode = cy.nodes().filter(function(node) {
                const nodeName = node.data('name') ? node.data('name').replace(/"/g, '') : node.id();
                return nodeName === metaboliteName;
            });
            
            if (targetNode.length > 0) {
                // Use the same toggle function as direct node clicks
                toggleNodeHighlight(targetNode[0]);
            }
        }

        // Load the file and initialize
        fetch("network_data.cyjs")
            .then(res => {
                if (!res.ok) {
                    throw new Error('Arquivo não encontrado.');
                }
                return res.json();
            })
            .then(data => {
                initializeCytoscape(data);
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('centrality-results').innerHTML = 
                    '<div class="centrality-results"><h3>Error</h3><p>Could not load network data. Make sure file exists.</p></div>';
            });
    </script>
</body>
</html>
